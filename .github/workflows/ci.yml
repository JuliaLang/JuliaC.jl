name: CI

on:
  push:
    branches: [ main ]
    tags: ['*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  actions: write
  contents: read

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: [ '1' , 'pre', 'nightly']
        os: [ ubuntu-latest, windows-latest, macos-15-intel]
        arch: [ x64 ]
        include:
          - os: macos-latest
            arch: aarch64
            version: '1'
          - os: macos-latest
            arch: aarch64
            version: 'pre'
          - os: macos-latest
            arch: aarch64
            version: 'nightly'
          - os: ubuntu-latest
            arch: x86
            version: '1'
          - os: ubuntu-latest
            arch: x86
            version: 'pre'
          - os: ubuntu-latest
            arch: x86
            version: 'nightly'
          - os: windows-latest
            arch: x86
            version: '1'
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - name: Install 32-bit cross toolchain
        if: ${{ runner.os == 'Linux' && matrix.arch == 'x86' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

